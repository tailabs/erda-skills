version: "1.1"

on:
  push:
    branches:
      - main

stages:
  - stage:
      - git-checkout:
          alias: repo
          params:
            depth: 1
  - stage:
      - buildpack:
          alias: build
          params:
            context: ${repo}
            modules:
              - name: app
                path: .
            only_build: false
  - stage:
      - custom-script:
          alias: verify-build
          commands:
            - echo "built image artifact is available from ${build}/pack-result"
            - echo "continue with your delivery flow after build verification"
